<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'styles/style.css' %}" />
    <title>Oradio — Create Account</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-wrap { width: 100%; max-width: 440px; padding: 24px; }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo h1 { font-family: var(--font-display); font-size: 2.4rem; color: var(--amber); }
        .auth-logo p { color: var(--text-3); font-size: 0.875rem; margin-top: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-logo">
            <h1>Oradio</h1>
            <p>Join the conversation.</p>
        </div>

        <form class="form" method="POST">
            {% csrf_token %}
            <div class="form-row">
                <div class="form__group">
                    <label for="first_name">First name</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Jane" />
                </div>
                <div class="form__group">
                    <label for="last_name">Last name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Doe" />
                </div>
            </div>
            <div class="form__group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="@janedoe" />
            </div>
            <div class="form__group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com" />
            </div>
            <div class="form__group">
                <label for="password1">Password</label>
                <input type="password" id="password1" name="password1" placeholder="••••••••" />
            </div>
            <div class="form__group">
                <label for="password2">Confirm password</label>
                <input type="password" id="password2" name="password2" placeholder="••••••••" />
            </div>
            <button class="btn btn--main" type="submit" style="justify-content:center;">Create Account</button>
        </form>

        <div class="auth__action">
            <p>Already have an account?</p>
            <a href="{% url 'login' %}" ><strong>Login</strong></a>
        </div>
    </div>
</body>
</html>
